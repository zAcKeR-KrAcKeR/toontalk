<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#DDD6FE;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
  </defs>
  <rect width="200" height="280" fill="url(#bg)" rx="12"/>
  <ellipse cx="100" cy="140" rx="80" ry="80" fill="url(#glow)"/>
  <!-- Stars -->
  <text x="30" y="60" font-size="18" opacity="0.6">✨</text>
  <text x="150" y="80" font-size="14" opacity="0.5">⭐</text>
  <text x="170" y="200" font-size="16" opacity="0.6">💫</text>
  <text x="15" y="220" font-size="12" opacity="0.5">🌟</text>
  <!-- Character silhouette -->
  <circle cx="100" cy="100" r="35" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <text x="100" y="115" text-anchor="middle" font-size="36">🎭</text>
  <!-- Name area -->
  <rect x="20" y="190" width="160" height="50" rx="8" fill="rgba(0,0,0,0.3)"/>
  <text x="100" y="220" text-anchor="middle" fill="white" font-size="13" font-weight="bold" font-family="Arial, sans-serif">CHARACTER</text>
  <!-- Bottom accent -->
  <rect x="0" y="270" width="200" height="10" fill="rgba(221,214,254,0.4)" rx="0 0 12 12"/>
</svg>
